version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cobrofutbol
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_RUNTIME: web
      PORT: 3000
    depends_on:
      - postgres
      - redis
    volumes:
      - storage_data:/app/storage

  worker:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_RUNTIME: worker
      PORT: 3001
    depends_on:
      - postgres
      - redis
    volumes:
      - storage_data:/app/storage

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.http.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
  storage_data:
